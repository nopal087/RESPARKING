<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counter Kendaraan</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Konter Kendaraan">

    <link rel="icon" type="image/png" href="/image.png">
    <link rel="apple-touch-icon" href="/image.png">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Mengubah latar belakang utama menjadi putih */
            background-color: #ffffff;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            /* Mengubah warna teks menjadi gelap agar kontras dengan putih */
            color: #1e293b;
            font-family: sans-serif;
            z-index: -1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            /* Spinner dengan aksen abu-abu muda dan biru */
            border: 4px solid #f1f5f9;
            border-left-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="font-size: 16px; font-weight: 900; letter-spacing: 1px;">VEHICLE COUNTER</div>
        <div style="font-size: 11px; opacity: 0.5; margin-top: 5px;">Memuat sistem hitung...</div>
    </div>

    <iframe
        src="https://script.google.com/macros/s/AKfycbxD-JsMVbPTWGRqkq8jzs1Ryupjl8J3rwsB6pNobtdsmEue0dI62c41eiGCrbFX8-Ay/exec"
        allow="camera; geolocation; microphone" allowfullscreen>
    </iframe>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker sukses didaftarkan');
                    })
                    .catch(err => {
                        console.log('ServiceWorker gagal didaftarkan: ', err);
                    });
            });
        }
    </script>
</body>

</html>
