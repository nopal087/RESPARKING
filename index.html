<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counter Kendaraan</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Konter Kendaraan">

    <!-- Mengarah ke file lokal di dalam folder -->
    <link rel="icon" type="image/png" href="/image.png">
    <link rel="apple-touch-icon" href="/image.png">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
            z-index: -1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="font-size: 16px; font-weight: 900; letter-spacing: 1px;">VEHICLE COUNTER</div>
        <div style="font-size: 11px; opacity: 0.6; margin-top: 5px;">Memuat sistem hitung...</div>
    </div>

    <!-- Link Apps Script untuk Counter Kendaraan -->
    <iframe
        src="https://script.google.com/macros/s/AKfycbxD-JsMVbPTWGRqkq8jzs1Ryupjl8J3rwsB6pNobtdsmEue0dI62c41eiGCrbFX8-Ay/exec"
        allow="camera; geolocation; microphone" allowfullscreen>
    </iframe>

    <!-- Registrasi Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker sukses didaftarkan dengan scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker gagal didaftarkan: ', err);
                    });
            });
        }
    </script>
</body>

</html>
